<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>

    <!-- Navbar -->
     <nav>
      <div class="logo">🌴 Wander<span>Vista</span></div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#destinations">Destinations</a></li>
        <li><a href="tripplanner.html">Trip Planner</a></li>
        <li><a href="expenseplanner.html">Expense Planner</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="index.html#reviews">Reviews</a></li>
      </ul>
      <a href="index.html#contact" class="nav-cta">Plan a Trip</a>
      <button id="menu-btn" onclick="toggleMenu()">☰</button>
    </nav>

    <!-- Profile Section -->
    <div class="profile-container">

        <h2>User Profile</h2>

        <div class="profile-image">
            <img src="images/profile.jpg" alt="Profile Photo" id="profilePhoto">
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" value="John Doe" disabled>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" value="john@example.com" disabled>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" value="9876543210" disabled>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea id="address" disabled>New York, USA</textarea>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" value="2000-01-01" disabled>
        </div>

        <div class="button-group">
            <button id="editBtn" onclick="editProfile()">Edit Profile</button>

            <button onclick="changePassword()">Change Password</button>

            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

    </div>
<script>
 // ==========================
// Profile Management
// ==========================

// Get form elements
const fullName = document.getElementById("fullName");
const email = document.getElementById("email");
const phone = document.getElementById("phone");
const address = document.getElementById("address");
const dob = document.getElementById("dob");

// Buttons
const editBtn = document.getElementById("editBtn");

// -------------------------
// Disable fields initially
// -------------------------
window.onload = () => {
    disableFields();
};

// -------------------------
// Enable Editing
// -------------------------
function editProfile() {

    if (editBtn.innerText === "Edit Profile") {

        enableFields();
        editBtn.innerText = "Save Profile";

    } else {

        if (validateForm()) {

            disableFields();
            editBtn.innerText = "Edit Profile";

            alert("Profile updated successfully!");

        }
    }

}

// -------------------------
// Enable Fields
// -------------------------
function enableFields() {

    fullName.disabled = false;
    email.disabled = false;
    phone.disabled = false;
    address.disabled = false;
    dob.disabled = false;

}

// -------------------------
// Disable Fields
// -------------------------
function disableFields() {

    fullName.disabled = true;
    email.disabled = true;
    phone.disabled = true;
    address.disabled = true;
    dob.disabled = true;

}

// -------------------------
// Validate Form
// -------------------------
function validateForm() {

    const nameValue = fullName.value.trim();
    const emailValue = email.value.trim();
    const phoneValue = phone.value.trim();

    // Name Validation
    if (nameValue === "") {
        alert("Full Name cannot be empty.");
        fullName.focus();
        return false;
    }

    if (nameValue.length < 3) {
        alert("Full Name must contain at least 3 characters.");
        fullName.focus();
        return false;
    }

    // Email Validation
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailPattern.test(emailValue)) {
        alert("Please enter a valid email address.");
        email.focus();
        return false;
    }

    // Phone Validation
    const phonePattern = /^\d{10}$/;

    if (!phonePattern.test(phoneValue)) {
        alert("Phone number must contain exactly 10 digits.");
        phone.focus();
        return false;
    }

    return true;

}

// -------------------------
// Change Password
// -------------------------
function changePassword() {

    const currentPassword = prompt("Enter Current Password:");

    if (currentPassword === null) return;

    const newPassword = prompt("Enter New Password:");

    if (newPassword === null) return;

    const confirmPassword = prompt("Confirm New Password:");

    if (confirmPassword === null) return;

    if (newPassword.length === 6) {
        alert("Password must be at least 6 characters.");
        return;
    }

    if (newPassword !== confirmPassword) {
        alert("Passwords do not match.");
        return;
    }

    alert("Password changed successfully!");

}

// -------------------------
// Logout
// -------------------------
function logout() {

    const confirmLogout = confirm("Are you sure you want to logout?");

    if (confirmLogout) {

        alert("Logged out successfully!");

        window.location.href = "index.html";

    }

}</script>

</body>
</html>
